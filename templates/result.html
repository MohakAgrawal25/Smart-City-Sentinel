<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart City AI | Detection Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #0b1120, #030614);
      background-attachment: fixed;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eef2ff;
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* subtle animated grid overlay — same as upload page for consistency */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(56, 189, 248, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* main container, all content above grid */
    h1, .grid, .no-detections, .map-link-wrapper {
      position: relative;
      z-index: 2;
    }

    /* heading style */
    h1 {
      font-size: clamp(2rem, 7vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #E2F0FF 0%, #7AC7FF 40%, #2DD4BF 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeSlideDown 0.5s ease-out;
    }

    /* responsive grid: 3 columns, but adapts gracefully */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
      max-width: 1400px;
      margin: 0 auto 2.5rem auto;
      padding: 0.5rem;
    }

    /* glassmorphic card */
    .card {
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.2rem 1.2rem 1.5rem 1.2rem;
      text-align: center;
      border: 1px solid rgba(56, 189, 248, 0.3);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.4);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(56, 189, 248, 0.8);
      background: rgba(20, 32, 55, 0.75);
      box-shadow: 0 25px 40px -14px rgba(45, 212, 191, 0.25);
    }

    .card h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      background: linear-gradient(120deg, #c7e2ff, #a0d0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    /* image styling */
    .card img {
      width: 100%;
      border-radius: 1.2rem;
      display: block;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease;
    }

    .card:hover img {
      transform: scale(1.01);
    }

    /* no detections message */
    .no-detections {
      background: rgba(15, 25, 45, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      max-width: 550px;
      margin: 2rem auto;
      border: 1px solid rgba(248, 113, 113, 0.4);
    }

    .no {
      font-size: 1.3rem;
      font-weight: 500;
      color: #f87171;
      background: rgba(248, 113, 113, 0.12);
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 3rem;
      letter-spacing: -0.2px;
    }

    /* map link container + beautiful button style */
    .map-link-wrapper {
      text-align: center;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      background: linear-gradient(105deg, #1e88e5, #0f67b3);
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(96, 165, 250, 0.5);
      backdrop-filter: blur(4px);
    }

    .map-btn:hover {
      background: linear-gradient(105deg, #2b9ef0, #1882c4);
      transform: translateY(-2px);
      box-shadow: 0 12px 22px -8px #1e88e5;
      border-color: #60a5fa;
    }

    .map-btn:active {
      transform: translateY(1px);
    }

    /* small animations */
    @keyframes fadeSlideDown {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* responsive fine-tuning */
    @media (max-width: 700px) {
      body {
        padding: 1.5rem 1rem;
      }
      .grid {
        gap: 1.2rem;
      }
      .card {
        padding: 1rem;
      }
      .card h3 {
        font-size: 1.2rem;
      }
      .map-btn {
        padding: 0.65rem 1.5rem;
        font-size: 0.95rem;
      }
      .no {
        font-size: 1.1rem;
      }
    }

    /* for ultra wide screens, limit max-width and center */
    @media (min-width: 1600px) {
      .grid {
        max-width: 1500px;
      }
    }
  </style>
</head>
<body>

<h1>📸 Detection Results</h1>

{% if outputs %}
<div class="grid">
    {% for k, v in outputs.items() %}
    <div class="card">
        <h3>{{ k.replace('_', ' ').title() }}</h3>
        <img src="{{ url_for('static', filename=v) }}" alt="{{ k }}">
    </div>
    {% endfor %}
</div>
{% else %}
<div class="no-detections">
    <p class="no">🔍 No detections found in this image.</p>
</div>
{% endif %}

<div class="map-link-wrapper">
    <a href="/map" class="map-btn">🗺️ View Interactive Map</a>
</div>

<script id="data" type="application/json">
{{ markers | tojson }}
</script>
<script>
let markers = JSON.parse(document.getElementById("data").textContent || "[]");
localStorage.setItem("markers", JSON.stringify(markers));
</script>

</body>
</html>
